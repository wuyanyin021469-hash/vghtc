<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 奇幻乘法冒險 🌟</title>
    <!-- 引入可愛的圓潤字體 Nunito -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- 引入 Canvas Confetti 產生彩帶效果 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --font-main: 'Nunito', 'Microsoft JhengHei', sans-serif;
        }

        body {
            font-family: var(--font-main);
            /* 使用漸層粉嫩背景 */
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #4a4a4a;
            overflow-x: hidden;
            position: relative;
        }

        /* 背景動態氣泡 */
        .bg-bubbles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .bg-bubbles li {
            position: absolute;
            list-style: none;
            display: block;
            width: 40px;
            height: 40px;
            background-color: rgba(255, 255, 255, 0.4);
            bottom: -160px;
            animation: floatUp 25s infinite linear;
            border-radius: 50%;
        }

        .bg-bubbles li:nth-child(1) {
            left: 10%;
            width: 80px;
            height: 80px;
            animation-duration: 15s;
        }

        .bg-bubbles li:nth-child(2) {
            left: 20%;
            width: 30px;
            height: 30px;
            animation-delay: 2s;
            animation-duration: 17s;
        }

        .bg-bubbles li:nth-child(3) {
            left: 25%;
            animation-delay: 4s;
        }

        .bg-bubbles li:nth-child(4) {
            left: 40%;
            width: 60px;
            height: 60px;
            animation-duration: 22s;
            background-color: rgba(255, 255, 255, 0.25);
        }

        .bg-bubbles li:nth-child(5) {
            left: 70%;
            animation-delay: 1s;
        }

        .bg-bubbles li:nth-child(6) {
            left: 80%;
            width: 120px;
            height: 120px;
            animation-delay: 3s;
            background-color: rgba(255, 255, 255, 0.2);
        }

        .bg-bubbles li:nth-child(7) {
            left: 32%;
            width: 160px;
            height: 160px;
            animation-delay: 7s;
        }

        .bg-bubbles li:nth-child(8) {
            left: 55%;
            width: 20px;
            height: 20px;
            animation-delay: 15s;
            animation-duration: 40s;
        }

        .bg-bubbles li:nth-child(9) {
            left: 25%;
            width: 10px;
            height: 10px;
            animation-delay: 2s;
            animation-duration: 40s;
            background-color: rgba(255, 255, 255, 0.3);
        }

        .bg-bubbles li:nth-child(10) {
            left: 90%;
            width: 160px;
            height: 160px;
            animation-delay: 11s;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0);
                opacity: 1;
            }

            100% {
                transform: translateY(-1200px) rotate(600deg);
                opacity: 0;
            }
        }

        /* 共用容器 */
        .screen {
            display: none;
            width: 100%;
            max-width: 1000px;
            padding: 2rem;
            box-sizing: border-box;
            flex-direction: column;
            align-items: center;
        }

        .screen.active {
            display: flex;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 首頁設計 */
        .header {
            text-align: center;
            margin-top: 10vh;
        }

        h1 {
            font-size: 4rem;
            color: #fff;
            text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.15);
            margin-bottom: 1rem;
        }

        .subtitle {
            font-size: 1.5rem;
            color: #fff;
            background: #ff9a9e;
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(255, 154, 158, 0.4);
            margin-bottom: 3rem;
        }

        .menu-btns {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .menu-btn {
            font-size: 2rem;
            padding: 1.5rem 3rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 900;
            font-family: var(--font-main);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .menu-btn.learn {
            background: #fff;
            color: #ff7675;
            box-shadow: 0 10px 20px rgba(255, 118, 117, 0.2);
            border-bottom: 6px solid #ffb8b8;
        }

        .menu-btn.game {
            background: #fff;
            color: #0984e3;
            box-shadow: 0 10px 20px rgba(9, 132, 227, 0.2);
            border-bottom: 6px solid #74b9ff;
        }

        .menu-btn:hover {
            transform: translateY(-8px) scale(1.05);
        }

        .menu-btn:active {
            transform: translateY(2px);
            border-bottom-width: 0;
            margin-top: 6px;
        }

        /* 頂部導航鈕 */
        .top-nav {
            width: 100%;
            display: flex;
            justify-content: flex-start;
            margin-bottom: 1rem;
        }

        .back-btn {
            font-size: 1.2rem;
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            border: none;
            background: #fff;
            color: #636e72;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            font-weight: 700;
            font-family: var(--font-main);
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-btn:hover {
            transform: translateY(-3px);
        }

        /* 學習模式 - 選單 */
        .learn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            width: 100%;
        }

        .learn-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 2rem 1.5rem;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            border: 4px solid #fff;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }

        .learn-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
        }

        /* 學習模式 - 視覺化互動 */
        .interactive-container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 40px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            width: 100%;
            border: 3px solid #fff;
        }

        .learn-title {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #2d3436;
            background: #fff;
            padding: 0.5rem 2rem;
            border-radius: 30px;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .equation-box {
            font-size: 6rem;
            font-weight: 900;
            color: #2c3e50;
            margin: 1rem 0;
            letter-spacing: 5px;
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px rgba(0, 0, 0, 0.1);
        }

        .equation-box .q-mark {
            color: #ff7675;
            display: inline-block;
        }

        .visual-groups {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
            margin: 2rem 0;
            min-height: 200px;
        }

        .visual-group {
            background: rgba(255, 255, 255, 0.7);
            border: 4px dashed #b2bec3;
            border-radius: 20px;
            padding: 1rem;
            display: flex;
            flex-wrap: wrap;
            align-content: center;
            justify-content: center;
            gap: 0.5rem;
            min-width: 80px;
            min-height: 80px;
            transition: transform 0.3s;
        }

        .visual-icon {
            font-size: 3rem;
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation-fill-mode: both;
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0);
            }

            60% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }

        .action-btn {
            font-size: 2rem;
            padding: 1.5rem 3rem;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: 900;
            font-family: var(--font-main);
            background: #ffeaa7;
            color: #d35400;
            box-shadow: 0 8px 0px #fdcb6e;
            transition: all 0.2s;
            margin-top: 1rem;
        }

        .action-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0px transparent;
        }

        /* 遊戲模式 */
        .game-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 3rem;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            max-width: 700px;
            width: 100%;
            border: 3px solid #fff;
            position: relative;
            overflow: hidden;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 2rem;
            background: #fff;
            padding: 1rem;
            border-radius: 20px;
            box-shadow: inset 0 3px 6px rgba(0, 0, 0, 0.05);
        }

        .score-box {
            color: #f39c12;
        }

        .combo-box {
            color: #e74c3c;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .option-btn {
            font-size: 3.5rem;
            padding: 1.5rem;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font-main);
            font-weight: 900;
            color: #2d3436;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 0px rgba(0, 0, 0, 0.1);
        }

        .option-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0px rgba(0, 0, 0, 0.1);
        }

        .option-btn:nth-child(1) {
            background: #ffeaa7;
            box-shadow: 0 8px 0px #fdcb6e;
        }

        .option-btn:nth-child(2) {
            background: #81ecec;
            box-shadow: 0 8px 0px #00cec9;
        }

        .option-btn:nth-child(3) {
            background: #fab1a0;
            box-shadow: 0 8px 0px #e17055;
        }

        .option-btn:nth-child(4) {
            background: #a29bfe;
            box-shadow: 0 8px 0px #6c5ce7;
        }

        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-15px) rotate(-5deg);
            }

            50% {
                transform: translateX(15px) rotate(5deg);
            }

            75% {
                transform: translateX(-15px) rotate(-5deg);
            }

            100% {
                transform: translateX(0);
            }
        }

        .shake {
            animation: shake 0.4s;
        }

        @keyframes popOut {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }

        .pop {
            animation: popOut 0.3s;
        }

        .feedback {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            font-weight: 900;
            color: #ff9f43;
            text-shadow: 3px 3px 0 #fff;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            z-index: 10;
        }

        .feedback.show {
            animation: floatUpWord 1s ease-out forwards;
        }

        @keyframes floatUpWord {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }

            20% {
                opacity: 1;
                transform: translate(-50%, -60%) scale(1.2);
            }

            80% {
                opacity: 1;
                transform: translate(-50%, -80%) scale(1);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -100%) scale(1);
            }
        }
    </style>
</head>

<body>

    <!-- 背景泡泡 -->
    <ul class="bg-bubbles">
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
    </ul>

    <!-- 首頁 -->
    <div id="home" class="screen active">
        <div class="header">
            <h1>🌟 奇幻乘法冒險 🌟</h1>
            <div class="subtitle">專為聰明小寶貝設計的數學遊戲！</div>
        </div>
        <div class="menu-btns">
            <button class="menu-btn learn" onclick="showScreen('learn-menu')">
                <span>📚</span> 學習寶典
            </button>
            <button class="menu-btn game" onclick="showScreen('game')">
                <span>🎮</span> 挑戰關卡
            </button>
        </div>
    </div>

    <!-- 學習模式：選擇要學習的數字 -->
    <div id="learn-menu" class="screen">
        <div class="top-nav">
            <button class="back-btn" onclick="showScreen('home')">⬅️ 回到首頁</button>
        </div>
        <h2 style="font-size: 2.5rem; color: #fff; text-shadow: 2px 2px 5px rgba(0,0,0,0.2); margin-bottom: 2rem;">
            你想和誰一起學習呢？</h2>
        <div class="learn-grid" id="learn-menu-container"></div>
    </div>

    <!-- 學習模式：視覺化互動學習 -->
    <div id="learn-interactive" class="screen">
        <div class="top-nav">
            <button class="back-btn" onclick="showScreen('learn-menu')">⬅️ 換個小動物</button>
        </div>
        <div class="interactive-container">
            <h2 id="learn-title" class="learn-title">🐰 2 的乘法</h2>
            <div class="equation-box" id="learn-equation">2 × 1 = <span class="q-mark" id="learn-ans">?</span></div>
            <div class="visual-groups" id="visual-groups"></div>
            <button class="action-btn" id="learn-action-btn" onclick="revealLearnAnswer()">看答案！👀</button>
        </div>
    </div>

    <!-- 遊戲模式 -->
    <div id="game" class="screen">
        <div class="top-nav">
            <button class="back-btn" onclick="showScreen('home')">⬅️ 結束挑戰</button>
        </div>
        <div class="game-container">
            <div class="stats">
                <div class="score-box">⭐ 分數: <span id="score">0</span></div>
                <div class="combo-box">🔥 連擊: <span id="combo">0</span></div>
            </div>
            <div class="equation-box" id="question-text">
                2 × 3 = ?
            </div>
            <div class="options" id="options-container"></div>
            <div id="feedback-msg" class="feedback">好棒！🎉</div>
        </div>
    </div>

    <script>
        // 設定不同數字的可愛主題色與動物
        const themes = [
            { num: 2, color: '#ffb8b8', icon: '🐰', bg: 'rgba(255, 184, 184, 0.4)', name: '小兔兔' },
            { num: 3, color: '#ffdfba', icon: '🐱', bg: 'rgba(255, 223, 186, 0.4)', name: '小貓咪' },
            { num: 4, color: '#ffffba', icon: '🐶', bg: 'rgba(255, 255, 186, 0.6)', name: '小狗狗' },
            { num: 5, color: '#baffc9', icon: '🐸', bg: 'rgba(186, 255, 201, 0.5)', name: '小青蛙' },
            { num: 6, color: '#bae1ff', icon: '🐳', bg: 'rgba(186, 225, 255, 0.5)', name: '小鯨魚' },
            { num: 7, color: '#e2cbff', icon: '🦄', bg: 'rgba(226, 203, 255, 0.5)', name: '獨角獸' },
            { num: 8, color: '#ffb3e6', icon: '🐷', bg: 'rgba(255, 179, 230, 0.4)', name: '小豬豬' },
            { num: 9, color: '#ffc6ff', icon: '🦊', bg: 'rgba(255, 198, 255, 0.4)', name: '小狐狸' }
        ];

        let currentScore = 0;
        let currentCombo = 0;
        let currentQuestion = {};
        const praises = ['好棒！🎉', '太厲害了！🌟', '天才！💡', '繼續加油！🔥', '滿分！💯'];

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (id === 'game') {
                startGame();
            }
        }

        /* ----- 學習模式相關邏輯 ----- */
        let learnCurrentTheme = null;
        let learnCurrentFactor = 1;

        function generateLearnMenu() {
            const container = document.getElementById('learn-menu-container');
            container.innerHTML = '';

            themes.forEach(theme => {
                const card = document.createElement('div');
                card.className = 'learn-card';
                card.style.backgroundColor = theme.bg;
                card.style.borderColor = theme.color;
                card.style.cursor = 'pointer';
                card.onclick = () => startInteractiveLearn(theme);

                let html = `<div style="font-size: 4rem; margin-bottom: 0.5rem;">${theme.icon}</div>
                            <h2 style="color: #2d3436; margin:0; font-size: 2rem;">${theme.num} 的乘法</h2>
                            <p style="font-size: 1.1rem; font-weight: bold; color: #636e72; margin-top: 1rem; background: #fff; border-radius: 20px; padding: 0.3rem;">和 ${theme.name} 一起學</p>`;
                card.innerHTML = html;
                container.appendChild(card);
            });
        }

        function startInteractiveLearn(theme) {
            learnCurrentTheme = theme;
            learnCurrentFactor = 1;
            showScreen('learn-interactive');
            renderLearnStep();
        }

        function renderLearnStep() {
            const title = document.getElementById('learn-title');
            const equation = document.getElementById('learn-equation');
            const groupsContainer = document.getElementById('visual-groups');
            const actionBtn = document.getElementById('learn-action-btn');

            title.innerHTML = `${learnCurrentTheme.icon} <b>${learnCurrentTheme.num}</b> 的乘法`;
            title.style.color = learnCurrentTheme.color;
            // 如果顏色太淺，給字體加上輪廓
            title.style.textShadow = "1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000";

            equation.innerHTML = `${learnCurrentTheme.num} × ${learnCurrentFactor} = <span class="q-mark" id="learn-ans">?</span>`;

            actionBtn.innerText = "看答案！👀";
            actionBtn.onclick = revealLearnAnswer;
            actionBtn.style.background = '#ffeaa7';
            actionBtn.style.color = '#d35400';
            actionBtn.style.boxShadow = '0 8px 0px #fdcb6e';

            groupsContainer.innerHTML = '';

            // 根據當前的乘數，產生對應數量的「群組」
            for (let i = 0; i < learnCurrentFactor; i++) {
                const group = document.createElement('div');
                group.className = 'visual-group';
                group.style.borderColor = learnCurrentTheme.color;
                group.style.backgroundColor = learnCurrentTheme.bg;

                // 每個群組裡面有被乘數 (theme.num) 個動物
                for (let j = 0; j < learnCurrentTheme.num; j++) {
                    const icon = document.createElement('div');
                    icon.className = 'visual-icon';
                    icon.innerText = learnCurrentTheme.icon;
                    // 製造彈出的時間差
                    icon.style.animationDelay = `${(i * learnCurrentTheme.num + j) * 0.05}s`;
                    group.appendChild(icon);
                }
                groupsContainer.appendChild(group);
            }
        }

        function revealLearnAnswer() {
            const ansSpan = document.getElementById('learn-ans');
            const ans = learnCurrentTheme.num * learnCurrentFactor;

            ansSpan.innerText = ans;
            ansSpan.style.color = '#00b894'; // 正確答案顯示綠色
            ansSpan.classList.add('pop');

            // 讓所有小動物開心地跳一下
            document.querySelectorAll('.visual-icon').forEach(icon => {
                icon.style.animation = 'none';
                void icon.offsetWidth; // 觸發重繪
                icon.style.animation = 'bounceIn 0.5s ease-in-out';
            });

            const actionBtn = document.getElementById('learn-action-btn');

            if (learnCurrentFactor < 9) {
                actionBtn.innerText = "下一個！➡️";
                actionBtn.onclick = () => {
                    learnCurrentFactor++;
                    renderLearnStep();
                };
            } else {
                actionBtn.innerText = "恭喜完成！🎉";
                actionBtn.onclick = () => {
                    shootConfetti();
                    setTimeout(() => showScreen('learn-menu'), 1500);
                };
            }
            actionBtn.style.background = '#81ecec';
            actionBtn.style.color = '#008b8b';
            actionBtn.style.boxShadow = '0 8px 0px #00cec9';
        }

        /* ----- 遊戲模式相關邏輯 ----- */
        function startGame() {
            currentScore = 0;
            currentCombo = 0;
            updateStats();
            nextQuestion();
        }

        function nextQuestion() {
            const factor1 = Math.floor(Math.random() * 8) + 2;
            const factor2 = Math.floor(Math.random() * 9) + 1;
            const answer = factor1 * factor2;

            currentQuestion = { factor1, factor2, answer };

            const questionEl = document.getElementById('question-text');
            questionEl.innerText = `${factor1} × ${factor2} = ?`;
            questionEl.classList.add('pop');
            setTimeout(() => questionEl.classList.remove('pop'), 300);

            let options = new Set();
            options.add(answer);
            while (options.size < 4) {
                let wrongF1 = Math.floor(Math.random() * 8) + 2;
                let wrongF2 = Math.floor(Math.random() * 9) + 1;
                let wrongAns = wrongF1 * wrongF2;
                if (wrongAns !== answer) {
                    options.add(wrongAns);
                }
            }
            let optionsArr = Array.from(options);
            optionsArr.sort(() => Math.random() - 0.5);

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            optionsArr.forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selected, btn) {
            if (selected === currentQuestion.answer) {
                shootConfetti();
                showFeedback();

                currentCombo++;
                currentScore += 10 + (currentCombo * 2);
                updateStats();

                document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
                setTimeout(nextQuestion, 1000);
            } else {
                btn.classList.add('shake');
                setTimeout(() => btn.classList.remove('shake'), 400);
                currentCombo = 0;
                updateStats();
            }
        }

        function updateStats() {
            const scoreEl = document.getElementById('score');
            const comboEl = document.getElementById('combo');

            if (scoreEl.innerText != currentScore) {
                scoreEl.innerText = currentScore;
                scoreEl.parentElement.classList.add('pop');
                setTimeout(() => scoreEl.parentElement.classList.remove('pop'), 300);
            }

            if (comboEl.innerText != currentCombo) {
                comboEl.innerText = currentCombo;
                if (currentCombo > 0) {
                    comboEl.parentElement.classList.add('pop');
                    setTimeout(() => comboEl.parentElement.classList.remove('pop'), 300);
                }
            }
        }

        function shootConfetti() {
            var duration = 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ffb8b8', '#ffdfba', '#ffffba', '#baffc9', '#bae1ff']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ffb8b8', '#ffdfba', '#ffffba', '#baffc9', '#bae1ff']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        function showFeedback() {
            const msg = document.getElementById('feedback-msg');
            msg.innerText = praises[Math.floor(Math.random() * praises.length)];

            msg.classList.remove('show');
            void msg.offsetWidth;
            msg.classList.add('show');
        }

        window.onload = () => {
            generateLearnMenu();
        };
    </script>
</body>

</html>

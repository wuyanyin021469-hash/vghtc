<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 奇幻乘法冒險 🌟</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --font-main: 'Nunito', 'Microsoft JhengHei', sans-serif;
            --primary-color: #ff9a9e;
        }

        body {
            font-family: var(--font-main);
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #4a4a4a;
            overflow-x: hidden;
            position: relative;
            user-select: none;
            /* 防止小朋友亂選文字 */
        }

        /* 統一按鈕動畫與預設樣式 */
        button {
            font-family: var(--font-main);
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 動態背景氣泡 */
        .bg-bubbles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .bg-bubbles li {
            position: absolute;
            list-style: none;
            display: block;
            background-color: rgba(255, 255, 255, 0.4);
            bottom: -160px;
            border-radius: 50%;
            animation: floatUp 25s infinite linear;
        }

        .bg-bubbles li:nth-child(1) {
            left: 10%;
            width: 80px;
            height: 80px;
            animation-duration: 15s;
        }

        .bg-bubbles li:nth-child(2) {
            left: 20%;
            width: 30px;
            height: 30px;
            animation-delay: 2s;
            animation-duration: 17s;
        }

        .bg-bubbles li:nth-child(3) {
            left: 25%;
            width: 50px;
            height: 50px;
            animation-delay: 4s;
        }

        .bg-bubbles li:nth-child(4) {
            left: 40%;
            width: 60px;
            height: 60px;
            animation-duration: 22s;
            background-color: rgba(255, 255, 255, 0.25);
        }

        .bg-bubbles li:nth-child(5) {
            left: 70%;
            width: 45px;
            height: 45px;
            animation-delay: 1s;
        }

        .bg-bubbles li:nth-child(6) {
            left: 80%;
            width: 120px;
            height: 120px;
            animation-delay: 3s;
            background-color: rgba(255, 255, 255, 0.2);
        }

        .bg-bubbles li:nth-child(7) {
            left: 32%;
            width: 160px;
            height: 160px;
            animation-delay: 7s;
        }

        .bg-bubbles li:nth-child(8) {
            left: 55%;
            width: 20px;
            height: 20px;
            animation-delay: 15s;
            animation-duration: 40s;
        }

        .bg-bubbles li:nth-child(9) {
            left: 25%;
            width: 10px;
            height: 10px;
            animation-delay: 2s;
            animation-duration: 40s;
            background-color: rgba(255, 255, 255, 0.3);
        }

        .bg-bubbles li:nth-child(10) {
            left: 90%;
            width: 160px;
            height: 160px;
            animation-delay: 11s;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0);
                opacity: 1;
            }

            100% {
                transform: translateY(-1200px) rotate(600deg);
                opacity: 0;
            }
        }

        /* 畫面切換 */
        .screen {
            display: none;
            width: 100%;
            max-width: 1000px;
            padding: 2rem;
            box-sizing: border-box;
            flex-direction: column;
            align-items: center;
        }

        .screen.active {
            display: flex;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 頂部導航鈕 */
        .top-nav {
            width: 100%;
            display: flex;
            justify-content: flex-start;
            margin-bottom: 1rem;
        }

        .back-btn {
            font-size: 1.2rem;
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            border: none;
            background: #fff;
            color: #636e72;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            font-weight: 700;
            transition: transform 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-btn:hover {
            transform: translateY(-3px);
        }

        .back-btn:active {
            transform: translateY(1px);
        }

        /* ====== 首頁 ====== */
        .header {
            text-align: center;
            margin-top: 10vh;
        }

        h1 {
            font-size: 4rem;
            color: #fff;
            text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.15);
            margin-bottom: 1rem;
        }

        .subtitle {
            font-size: 1.5rem;
            color: #fff;
            background: var(--primary-color);
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(255, 154, 158, 0.4);
            margin-bottom: 3rem;
        }

        .menu-btns {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .menu-btn {
            font-size: 2rem;
            padding: 2rem 4rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 900;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .menu-btn.learn {
            background: #fff;
            color: #ff7675;
            box-shadow: 0 10px 20px rgba(255, 118, 117, 0.2);
            border-bottom: 8px solid #ffb8b8;
        }

        .menu-btn.game {
            background: #fff;
            color: #0984e3;
            box-shadow: 0 10px 20px rgba(9, 132, 227, 0.2);
            border-bottom: 8px solid #74b9ff;
        }

        .menu-btn .icon {
            font-size: 4rem;
        }

        .menu-btn:hover {
            transform: translateY(-10px) scale(1.05);
        }

        .menu-btn:active {
            transform: translateY(2px);
            border-bottom-width: 0;
            margin-top: 8px;
        }

        /* ====== 學習選單 (選動物) ====== */
        .learn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            width: 100%;
        }

        .learn-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 2rem 1.5rem;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            border: 4px solid #fff;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .learn-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
        }


        /* ====== 互動式學習 (全新魔法黑板) ====== */
        .blackboard-container {
            background: #2d3436;
            /* 變回黑板風以凸顯主角顏色 */
            border-radius: 40px;
            border: 12px solid #b2bec3;
            padding: 2rem;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2), inset 0 0 20px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* 黑板上方的粉筆字標題 */
        .chalk-title {
            font-size: 2.5rem;
            color: #f5f6fa;
            font-family: 'Comic Sans MS', 'Nunito', cursive;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* 乘法題目與拖曳區 */
        .puzzle-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            margin: 2rem 0;
            min-height: 250px;
        }

        .equation-display {
            font-size: 5rem;
            font-weight: 900;
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            padding: 1rem 3rem;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 1rem;
        }

        /* 裝載動物的籃子 (視覺化) */
        .baskets-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 30px;
        }

        .basket {
            border: 4px dashed #fff;
            border-radius: 20px;
            width: 100px;
            min-height: 100px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            justify-content: center;
            gap: 5px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }

        .basket.highlight {
            border-color: #ffeaa7;
            background: rgba(255, 234, 167, 0.2);
            transform: scale(1.05);
        }

        /* 產生出來等待被點擊/分配的動物 */
        .waiting-animals {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            min-height: 80px;
            margin-top: 1rem;
        }

        .animal-item {
            font-size: 3.5rem;
            cursor: pointer;
            transition: transform 0.2s;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(2px 4px 6px rgba(0, 0, 0, 0.3));
        }

        .animal-item:hover {
            transform: scale(1.2) rotate(-5deg);
        }

        .animal-item.placed {
            font-size: 2.2rem;
            cursor: default;
            margin: 2px;
        }

        /* 操作提示 */
        .hint-text {
            font-size: 1.8rem;
            color: #ffeaa7;
            font-weight: bold;
            margin-bottom: 1rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 0.8;
            }
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
            }

            80% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }

        /* 按鈕區 */
        .control-btns {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
        }

        .big-action-btn {
            font-size: 1.8rem;
            padding: 1rem 2.5rem;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            background: #00cec9;
            color: #fff;
            box-shadow: 0 6px 0px #019a96;
            transition: all 0.2s;
            display: none;
            /* 預設隱藏，破關才顯示 */
        }

        .big-action-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0px transparent;
        }


        /* ====== 遊戲模式 ====== */
        .game-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 3rem;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            max-width: 700px;
            width: 100%;
            border: 3px solid #fff;
            position: relative;
            overflow: hidden;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 2rem;
            background: #fff;
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: inset 0 3px 6px rgba(0, 0, 0, 0.05);
        }

        .score-box {
            color: #f39c12;
        }

        .combo-box {
            color: #e74c3c;
        }

        .question-box {
            font-size: 6rem;
            font-weight: 900;
            color: #2c3e50;
            margin-bottom: 3rem;
            letter-spacing: 5px;
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px rgba(0, 0, 0, 0.1);
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .option-btn {
            font-size: 4rem;
            padding: 1.5rem;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: 900;
            color: #2d3436;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 0px rgba(0, 0, 0, 0.15);
            border: 4px solid #fff;
        }

        .option-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0px rgba(0, 0, 0, 0.15);
        }

        .option-btn:nth-child(1) {
            background: #ffeaa7;
            box-shadow: 0 8px 0px #fdcb6e;
        }

        .option-btn:nth-child(2) {
            background: #81ecec;
            box-shadow: 0 8px 0px #00cec9;
        }

        .option-btn:nth-child(3) {
            background: #fab1a0;
            box-shadow: 0 8px 0px #e17055;
        }

        .option-btn:nth-child(4) {
            background: #a29bfe;
            box-shadow: 0 8px 0px #6c5ce7;
        }

        .shake {
            animation: shake 0.4s;
        }

        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-15px) rotate(-5deg);
            }

            50% {
                transform: translateX(15px) rotate(5deg);
            }

            75% {
                transform: translateX(-15px) rotate(-5deg);
            }

            100% {
                transform: translateX(0);
            }
        }

        .pop {
            animation: popOut 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popOut {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.3);
            }

            100% {
                transform: scale(1);
            }
        }

        .feedback {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 6rem;
            font-weight: 900;
            color: #ff9f43;
            text-shadow: 4px 4px 0 #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }

        .feedback.show {
            animation: floatUpWord 1s ease-out forwards;
        }

        @keyframes floatUpWord {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }

            20% {
                opacity: 1;
                transform: translate(-50%, -60%) scale(1.2) rotate(5deg);
            }

            80% {
                opacity: 1;
                transform: translate(-50%, -80%) scale(1) rotate(-5deg);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -100%) scale(1);
            }
        }
    </style>
</head>

<body>

    <!-- 背景泡泡 -->
    <ul class="bg-bubbles">
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
    </ul>

    <!-- 首頁 -->
    <div id="home" class="screen active">
        <div class="header">
            <h1>🌟 奇幻乘法冒險 🌟</h1>
            <div class="subtitle">專為聰明小寶貝設計的魔法算術！</div>
        </div>
        <div class="menu-btns">
            <button class="menu-btn learn" onclick="showScreen('learn-menu')">
                <span class="icon">🐾</span>魔法動物派對
                <span style="font-size: 1.2rem; color: #636e72;">把動物裝進籃子學乘法！</span>
            </button>
            <button class="menu-btn game" onclick="showScreen('game')">
                <span class="icon">🎮</span>超級闖關挑戰
                <span style="font-size: 1.2rem; color: #636e72;">挑戰連擊拿高分！</span>
            </button>
        </div>
    </div>

    <!-- 學習模式：選擇要學習的數字 -->
    <div id="learn-menu" class="screen">
        <div class="top-nav">
            <button class="back-btn" onclick="showScreen('home')">⬅️ 回到首頁</button>
        </div>
        <h2 style="font-size: 3rem; color: #fff; text-shadow: 2px 2px 5px rgba(0,0,0,0.2); margin-bottom: 2rem;">
            想參加誰的派對呢？</h2>
        <div class="learn-grid" id="learn-menu-container"></div>
    </div>

    <!-- 學習模式：裝籃子互動教學 -->
    <div id="learn-interactive" class="screen">
        <div class="top-nav">
            <button class="back-btn" onclick="showScreen('learn-menu')">⬅️ 換個小動物</button>
        </div>

        <div class="blackboard-container">
            <div id="learn-subtitle" class="chalk-title">🐹 水豚君的派對準備！</div>

            <div class="puzzle-area">
                <div class="equation-display">
                    <span id="eq-f1" style="color:#ffeaa7;">2</span>
                    <span style="color:#b2bec3;">×</span>
                    <span id="eq-f2" style="color:#81ecec;">1</span>
                    <span style="color:#b2bec3;">=</span>
                    <span id="eq-ans" style="color:#ff7675;">?</span>
                </div>

                <div id="hint-text" class="hint-text">點擊小動物，把牠們裝進發光的籃子裡！👆</div>

                <!-- 裝動物的籃子區 -->
                <div class="baskets-container" id="baskets-container"></div>

                <!-- 等待被點擊的動物區 -->
                <div class="waiting-animals" id="waiting-animals"></div>
            </div>

            <div class="control-btns">
                <button id="next-stage-btn" class="big-action-btn" onclick="nextLearnStage()">下一關！➡️</button>
            </div>
        </div>
    </div>

    <!-- 遊戲模式 -->
    <div id="game" class="screen">
        <div class="top-nav">
            <button class="back-btn" onclick="showScreen('home')">⬅️ 結束挑戰</button>
        </div>
        <div class="game-container">
            <div class="stats">
                <div class="score-box">⭐ 分數: <span id="score">0</span></div>
                <div class="combo-box">🔥 連擊: <span id="combo">0</span></div>
            </div>
            <div class="question-box" id="question-text">
                2 × 3 = ?
            </div>
            <div class="options" id="options-container"></div>
            <div id="feedback-msg" class="feedback">好棒！🎉</div>
        </div>
    </div>

    <script>
        const themes = [
            { num: 2, color: '#ffb8b8', icon: '🐰', name: '小兔兔' },
            { num: 3, color: '#bae1ff', icon: '🐧', name: '小企鵝' },
            { num: 4, color: '#baffc9', icon: '🐢', name: '小烏龜' },
            { num: 5, color: '#ffdfba', icon: '🐹', name: '水豚君' },
            { num: 6, color: '#ffc6ff', icon: '🐰', name: '粉紅兔' },
            { num: 7, color: '#81ecec', icon: '🐧', name: '冰企鵝' },
            { num: 8, color: '#55efc4', icon: '🐢', name: '綠蠵龜' },
            { num: 9, color: '#ffeaa7', icon: '🐹', name: '黃金水豚' }
        ];

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (id === 'game') startGame();
        }

        /* =====================================
           🌟 全新互動學習模式 - 裝進籃子裡 🌟
           ===================================== */
        let teachTheme = null;
        let teachMultiplier = 1; // 乘數 (籃子數量)
        let currentTargetBasket = 0; // 目前正在裝哪個籃子
        let animalsInCurrentBasket = 0; // 目前這籃裝了幾隻

        // 建立選單
        function generateLearnMenu() {
            const container = document.getElementById('learn-menu-container');
            container.innerHTML = '';

            themes.forEach(theme => {
                const card = document.createElement('div');
                card.className = 'learn-card';
                card.onclick = () => initInteractiveLearn(theme);

                let bColor = theme.color;
                card.style.borderColor = bColor;

                card.innerHTML = `
                    <div style="font-size: 5rem; line-height: 1;">${theme.icon}</div>
                    <h2 style="color: #2d3436; font-size: 2rem; margin: 10px 0;">${theme.num} 的派對</h2>
                    <span style="background: ${bColor}; color:#4a4a4a; padding: 4px 12px; border-radius: 15px; font-weight:bold;">${theme.name}</span>
                `;
                container.appendChild(card);
            });
        }

        // 初始化學習單元
        function initInteractiveLearn(theme) {
            teachTheme = theme;
            teachMultiplier = 1;
            showScreen('learn-interactive');
            document.getElementById('learn-subtitle').innerText = `${teachTheme.icon} ${teachTheme.name} 的算術派對！`;
            setupLearnStage();
        }

        // 設置當前關卡 (例如 2 x 3)
        function setupLearnStage() {
            currentTargetBasket = 0;
            animalsInCurrentBasket = 0;

            document.getElementById('eq-f1').innerText = teachTheme.num;
            document.getElementById('eq-f2').innerText = teachMultiplier;
            document.getElementById('eq-ans').innerText = '?';
            document.getElementById('eq-ans').style.color = '#ff7675';

            document.getElementById('hint-text').innerText = `請點擊下方的 ${teachTheme.icon}，把它裝進發光的籃子裡！👆`;
            document.getElementById('next-stage-btn').style.display = 'none';

            // 繪製空籃子
            const basketsDiv = document.getElementById('baskets-container');
            basketsDiv.innerHTML = '';
            for (let i = 0; i < teachMultiplier; i++) {
                let bas = document.createElement('div');
                bas.className = 'basket';
                bas.id = `basket-${i}`;
                basketsDiv.appendChild(bas);
            }
            highlightBasket(0); // 點亮第一個籃子

            // 繪製等待被點擊的動物
            const waitDiv = document.getElementById('waiting-animals');
            waitDiv.innerHTML = '';
            // 每個籃子需要 teachTheme.num 隻，總共產生需要數量的動物
            let totalNeeded = teachTheme.num * teachMultiplier;
            for (let i = 0; i < totalNeeded; i++) {
                let animal = document.createElement('div');
                animal.className = 'animal-item';
                animal.innerText = teachTheme.icon;
                animal.onclick = function () { moveToBasket(this); };
                waitDiv.appendChild(animal);
            }
        }

        function highlightBasket(index) {
            document.querySelectorAll('.basket').forEach(b => b.classList.remove('highlight'));
            let bas = document.getElementById(`basket-${index}`);
            if (bas) bas.classList.add('highlight');
        }

        // 點擊動物飛入籃子的邏輯
        function moveToBasket(element) {
            if (currentTargetBasket >= teachMultiplier) return; // 已經裝滿了

            let currentBasket = document.getElementById(`basket-${currentTargetBasket}`);

            // 將動物複製一份放進籃子，並加上 placed 樣式變小
            let inBasketAnimal = document.createElement('div');
            inBasketAnimal.innerText = teachTheme.icon;
            inBasketAnimal.className = 'animal-item placed';
            inBasketAnimal.style.animation = 'popIn 0.2s';
            currentBasket.appendChild(inBasketAnimal);

            // 移除被點擊的動物
            element.remove();

            animalsInCurrentBasket++;

            // 檢查當前籃子是否裝滿 (等於被乘數)
            if (animalsInCurrentBasket >= teachTheme.num) {
                animalsInCurrentBasket = 0;
                currentTargetBasket++;

                // 發出完成一個籃子的小慶祝
                currentBasket.classList.remove('highlight');
                currentBasket.style.borderColor = '#00b894';
                currentBasket.style.backgroundColor = 'rgba(0, 184, 148, 0.2)';
                currentBasket.classList.add('pop');
                setTimeout(() => currentBasket.classList.remove('pop'), 300);

                if (currentTargetBasket < teachMultiplier) {
                    highlightBasket(currentTargetBasket); // 下一個籃子發光
                } else {
                    stageCompleted(); // 全部的籃子都裝滿了！
                }
            }
        }

        // 當算式完成
        function stageCompleted() {
            let total = teachTheme.num * teachMultiplier;
            let ansEl = document.getElementById('eq-ans');

            ansEl.innerText = total;
            ansEl.style.color = '#00b894';
            ansEl.classList.add('pop');

            document.getElementById('hint-text').innerText = `太棒了！ ${teachMultiplier} 個籃子，各有 ${teachTheme.num} 隻，總共是 ${total} 隻！🎉`;

            let btn = document.getElementById('next-stage-btn');
            btn.style.display = 'inline-block';
            btn.classList.add('pop');

            shootConfettiMini();

            if (teachMultiplier === 9) {
                btn.innerText = "⭐ 闖關大成功！(回選單)";
            } else {
                btn.innerText = "挑戰下一個！➡️";
            }
        }

        function nextLearnStage() {
            if (teachMultiplier < 9) {
                teachMultiplier++;
                setupLearnStage();
            } else {
                shootConfettiMax();
                setTimeout(() => showScreen('learn-menu'), 2000);
            }
        }

        /* =====================================
           🎮 超級闖關挑戰 (遊戲模式) - 保持不變
           ===================================== */
        let currentScore = 0;
        let currentCombo = 0;
        let currentQuestion = {};
        const praises = ['好棒！🎉', '光速！⚡', '太強了！🌟', '連擊！🔥', '完美！💯'];

        function startGame() {
            currentScore = 0;
            currentCombo = 0;
            updateStats();
            nextQuestion();
        }

        function nextQuestion() {
            const factor1 = Math.floor(Math.random() * 8) + 2;
            const factor2 = Math.floor(Math.random() * 9) + 1;
            const answer = factor1 * factor2;
            currentQuestion = { factor1, factor2, answer };

            const questionEl = document.getElementById('question-text');
            questionEl.innerText = `${factor1} × ${factor2} = ?`;
            questionEl.classList.add('pop');
            setTimeout(() => questionEl.classList.remove('pop'), 300);

            let options = new Set();
            options.add(answer);
            while (options.size < 4) {
                let wrongAns = (Math.floor(Math.random() * 8) + 2) * (Math.floor(Math.random() * 9) + 1);
                if (wrongAns !== answer) options.add(wrongAns);
            }
            let optionsArr = Array.from(options).sort(() => Math.random() - 0.5);

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            optionsArr.forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selected, btn) {
            if (selected === currentQuestion.answer) {
                shootConfettiMini();
                showFeedback();
                currentCombo++;
                currentScore += 10 + (currentCombo * 5);
                updateStats();
                document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
                setTimeout(nextQuestion, 800);
            } else {
                btn.classList.add('shake');
                setTimeout(() => btn.classList.remove('shake'), 400);
                currentCombo = 0;
                updateStats();
            }
        }

        function updateStats() {
            document.getElementById('score').innerText = currentScore;
            document.getElementById('combo').innerText = currentCombo;
        }

        /* =====================================
           ✨ 共用的特效功能
           ===================================== */
        function shootConfettiMini() {
            confetti({ particleCount: 40, spread: 60, origin: { y: 0.6 }, colors: ['#ffeaa7', '#81ecec', '#ff7675'] });
        }
        function shootConfettiMax() {
            confetti({ particleCount: 150, zIndex: 9999 });
        }

        function showFeedback() {
            const msg = document.getElementById('feedback-msg');
            msg.innerText = praises[Math.floor(Math.random() * praises.length)];
            msg.classList.remove('show');
            void msg.offsetWidth;
            msg.classList.add('show');
        }

        window.onload = () => {
            generateLearnMenu();
        };
    </script>
</body>

</html>

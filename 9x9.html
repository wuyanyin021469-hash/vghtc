<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 奇幻乘法冒險 🌟</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --font-main: 'Nunito', 'Microsoft JhengHei', sans-serif;
            --primary-color: #ff9a9e;
        }

        body {
            font-family: var(--font-main);
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #4a4a4a;
            overflow-x: hidden;
            position: relative;
            user-select: none;
        }



        button {
            font-family: var(--font-main);
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 背景氣泡 */
        .bg-bubbles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .bg-bubbles li {
            position: absolute;
            list-style: none;
            display: block;
            background-color: rgba(255, 255, 255, 0.4);
            bottom: -160px;
            border-radius: 50%;
            animation: floatUp 25s infinite linear;
        }

        .bg-bubbles li:nth-child(1) {
            left: 10%;
            width: 80px;
            height: 80px;
            animation-duration: 15s;
        }

        .bg-bubbles li:nth-child(2) {
            left: 20%;
            width: 30px;
            height: 30px;
            animation-delay: 2s;
            animation-duration: 17s;
        }

        .bg-bubbles li:nth-child(3) {
            left: 25%;
            width: 50px;
            height: 50px;
            animation-delay: 4s;
        }

        .bg-bubbles li:nth-child(4) {
            left: 40%;
            width: 60px;
            height: 60px;
            animation-duration: 22s;
            background-color: rgba(255, 255, 255, 0.25);
        }

        .bg-bubbles li:nth-child(5) {
            left: 70%;
            width: 45px;
            height: 45px;
            animation-delay: 1s;
        }

        .bg-bubbles li:nth-child(6) {
            left: 80%;
            width: 120px;
            height: 120px;
            animation-delay: 3s;
            background-color: rgba(255, 255, 255, 0.2);
        }

        .bg-bubbles li:nth-child(7) {
            left: 32%;
            width: 160px;
            height: 160px;
            animation-delay: 7s;
        }

        .bg-bubbles li:nth-child(8) {
            left: 55%;
            width: 20px;
            height: 20px;
            animation-delay: 15s;
            animation-duration: 40s;
        }

        .bg-bubbles li:nth-child(9) {
            left: 25%;
            width: 10px;
            height: 10px;
            animation-delay: 2s;
            animation-duration: 40s;
            background-color: rgba(255, 255, 255, 0.3);
        }

        .bg-bubbles li:nth-child(10) {
            left: 90%;
            width: 160px;
            height: 160px;
            animation-delay: 11s;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0);
                opacity: 1;
            }

            100% {
                transform: translateY(-1200px) rotate(600deg);
                opacity: 0;
            }
        }

        .screen {
            display: none;
            width: 100%;
            max-width: 1000px;
            padding: 2rem;
            box-sizing: border-box;
            flex-direction: column;
            align-items: center;
        }

        .screen.active {
            display: flex;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .top-nav {
            width: 100%;
            display: flex;
            justify-content: flex-start;
            margin-bottom: 1rem;
        }

        .back-btn {
            font-size: 1.2rem;
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            border: none;
            background: #fff;
            color: #636e72;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            font-weight: 700;
            transition: transform 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-btn:hover {
            transform: translateY(-3px);
        }

        .header {
            text-align: center;
            margin-top: 10vh;
        }

        h1 {
            font-size: 4rem;
            color: #fff;
            text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.15);
            margin-bottom: 1rem;
        }

        .subtitle {
            font-size: 2rem;
            color: #fff;
            background: var(--primary-color);
            padding: 0.8rem 2rem;
            border-radius: 40px;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(255, 154, 158, 0.4);
            margin-bottom: 3rem;
            line-height: 1.5;
            /* 增加行高避免注音被切掉 */
        }

        .menu-btns {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .menu-btn {
            font-size: 2.2rem;
            padding: 2rem 4rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 900;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
            line-height: 1.4;
        }

        .menu-btn.learn {
            background: #fff;
            color: #ff7675;
            box-shadow: 0 10px 20px rgba(255, 118, 117, 0.2);
            border-bottom: 8px solid #ffb8b8;
        }

        .menu-btn.game {
            background: #fff;
            color: #0984e3;
            box-shadow: 0 10px 20px rgba(9, 132, 227, 0.2);
            border-bottom: 8px solid #74b9ff;
        }

        .menu-btn .icon {
            font-size: 4rem;
        }

        .menu-btn:hover {
            transform: translateY(-10px) scale(1.05);
        }

        .learn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            width: 100%;
        }

        .learn-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 2rem 1.5rem;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            border: 4px solid #fff;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            line-height: 1.5;
        }

        .learn-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
        }

        .blackboard-container {
            background: #2d3436;
            border-radius: 40px;
            border: 12px solid #b2bec3;
            padding: 2rem;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2), inset 0 0 20px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .chalk-title {
            font-size: 3rem;
            color: #f5f6fa;
            font-family: 'Nunito', sans-serif;
            margin-bottom: 1.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            line-height: 1.6;
        }

        .puzzle-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            margin: 2rem 0;
            min-height: 250px;
        }

        .equation-display {
            font-size: 5rem;
            font-weight: 900;
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            padding: 1rem 3rem;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 1rem;
        }

        .baskets-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 30px;
        }

        .basket {
            border: 4px dashed #fff;
            border-radius: 20px;
            width: 100px;
            min-height: 100px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            justify-content: center;
            gap: 5px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }

        .basket.highlight {
            border-color: #ffeaa7;
            background: rgba(255, 234, 167, 0.2);
            transform: scale(1.05);
        }

        .waiting-animals {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            min-height: 80px;
            margin-top: 1rem;
        }

        .animal-item {
            font-size: 3.5rem;
            cursor: pointer;
            transition: transform 0.2s;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(2px 4px 6px rgba(0, 0, 0, 0.3));
        }

        .animal-item:hover {
            transform: scale(1.2) rotate(-5deg);
        }

        .animal-item.placed {
            font-size: 2.2rem;
            cursor: default;
            margin: 2px;
        }

        .hint-text {
            font-size: 2.2rem;
            color: #ffeaa7;
            font-weight: bold;
            margin-bottom: 1rem;
            animation: pulse 1.5s infinite;
            line-height: 1.5;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 0.8;
            }
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
            }

            80% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }

        .control-btns {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
        }

        .big-action-btn {
            font-size: 2rem;
            padding: 1.5rem 3rem;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            background: #00cec9;
            color: #fff;
            box-shadow: 0 6px 0px #019a96;
            transition: all 0.2s;
            display: none;
            line-height: 1.5;
        }

        .big-action-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0px transparent;
        }


        /* ====== 遊戲模式 ====== */
        .game-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 3rem;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            max-width: 700px;
            width: 100%;
            border: 3px solid #fff;
            position: relative;
            overflow: hidden;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 2rem;
            background: #fff;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: inset 0 3px 6px rgba(0, 0, 0, 0.05);
            line-height: 1.5;
        }

        .score-box {
            color: #f39c12;
        }

        .combo-box {
            color: #e74c3c;
        }

        .question-box {
            font-size: 6rem;
            font-weight: 900;
            color: #2c3e50;
            margin-bottom: 3rem;
            letter-spacing: 5px;
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px rgba(0, 0, 0, 0.1);
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .option-btn {
            font-size: 4rem;
            padding: 1.5rem;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: 900;
            color: #2d3436;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 0px rgba(0, 0, 0, 0.15);
            border: 4px solid #fff;
        }

        .option-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0px rgba(0, 0, 0, 0.15);
        }

        .option-btn:nth-child(1) {
            background: #ffeaa7;
            box-shadow: 0 8px 0px #fdcb6e;
        }

        .option-btn:nth-child(2) {
            background: #81ecec;
            box-shadow: 0 8px 0px #00cec9;
        }

        .option-btn:nth-child(3) {
            background: #fab1a0;
            box-shadow: 0 8px 0px #e17055;
        }

        .option-btn:nth-child(4) {
            background: #a29bfe;
            box-shadow: 0 8px 0px #6c5ce7;
        }

        .shake {
            animation: shake 0.4s;
        }

        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-15px) rotate(-5deg);
            }

            50% {
                transform: translateX(15px) rotate(5deg);
            }

            75% {
                transform: translateX(-15px) rotate(-5deg);
            }

            100% {
                transform: translateX(0);
            }
        }

        .pop {
            animation: popOut 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popOut {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.3);
            }

            100% {
                transform: scale(1);
            }
        }

        .feedback {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 7rem;
            font-weight: 900;
            color: #ff9f43;
            text-shadow: 4px 4px 0 #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
            line-height: 1.5;
        }

        .feedback.show {
            animation: floatUpWord 1s ease-out forwards;
        }

        @keyframes floatUpWord {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }

            20% {
                opacity: 1;
                transform: translate(-50%, -60%) scale(1.2) rotate(5deg);
            }

            80% {
                opacity: 1;
                transform: translate(-50%, -80%) scale(1) rotate(-5deg);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -100%) scale(1);
            }
        }
    </style>
</head>

<body>

    <!-- 背景泡泡 -->
    <ul class="bg-bubbles">
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
    </ul>

    <!-- 首頁 -->
    <div id="home" class="screen active">
        <div class="header">
            <h1>奇幻乘法冒險</h1>
            <div class="subtitle">專為聰明
                    小寶貝設計的魔法算術！</div>
        </div>
        <div class="menu-btns">
            <button class="menu-btn learn" onclick="showScreen('learn-menu')">
                <span class="icon">🐾</span>
                <span>魔法動物派對</span>
                <span style="font-size: 1.4rem; color: #636e72;">把動物裝進籃子
                        學乘法！</span>
            </button>
            <button class="menu-btn game" onclick="showScreen('game')">
                <span class="icon">🎮</span>
                <span>超級闖關挑戰</span>
                <span style="font-size: 1.4rem; color: #636e72;">挑戰連擊拿高分！</span>
            </button>
        </div>
    </div>

    <!-- 學習模式：選擇要學習的數字 -->
    <div id="learn-menu" class="screen">
        <div class="top-nav">
            <button class="back-btn" onclick="showScreen('home')">⬅️ 回首頁</button>
        </div>
        <h2 style="font-size: 3.5rem; color: #fff; text-shadow: 2px 2px 5px rgba(0,0,0,0.2); margin-bottom: 2rem;">
            想參加誰的派對呢？
        </h2>
        <div class="learn-grid" id="learn-menu-container"></div>
    </div>

    <!-- 學習模式：裝籃子互動教學 -->
    <div id="learn-interactive" class="screen">
        <div class="top-nav">
            <button class="back-btn" onclick="showScreen('learn-menu')">⬅️ 換個小動物</button>
        </div>

        <div class="blackboard-container">
            <div id="learn-subtitle" class="chalk-title"></div>

            <div class="puzzle-area">
                <div class="equation-display">
                    <span id="eq-f1" style="color:#ffeaa7;">2</span>
                    <span style="color:#b2bec3;">×</span>
                    <span id="eq-f2" style="color:#81ecec;">1</span>
                    <span style="color:#b2bec3;">=</span>
                    <span id="eq-ans" style="color:#ff7675;">?</span>
                </div>

                <div id="hint-text" class="hint-text"></div>

                <div class="baskets-container" id="baskets-container"></div>
                <div class="waiting-animals" id="waiting-animals"></div>
            </div>

            <div class="control-btns">
                <button id="next-stage-btn" class="big-action-btn" onclick="nextLearnStage()"></button>
            </div>
        </div>
    </div>

    <!-- 遊戲模式 -->
    <div id="game" class="screen">
        <div class="top-nav">
            <button class="back-btn" onclick="showScreen('home')">⬅️ 結束挑戰</button>
        </div>
        <div class="game-container">
            <div class="stats">
                <div class="score-box">⭐ 分數: <span id="score">0</span>
                </div>
                <div class="combo-box">🔥 連擊: <span id="combo">0</span></div>
            </div>
            <div class="question-box" id="question-text">
                2 × 3 = ?
            </div>
            <div class="options" id="options-container"></div>
            <div id="feedback-msg" class="feedback"></div>
        </div>
    </div>

    <script>
        // --- 音效系統 (Web Audio API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration, vol = 0.1) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }
        const sfx = {
            click: () => playTone(600, 'sine', 0.1, 0.05),
            pop: () => {
                playTone(400, 'sine', 0.1, 0.1);
                setTimeout(() => playTone(600, 'sine', 0.1, 0.1), 50);
            },
            correct: () => {
                playTone(523.25, 'sine', 0.1, 0.1);
                setTimeout(() => playTone(659.25, 'sine', 0.1, 0.1), 100);
                setTimeout(() => playTone(783.99, 'sine', 0.2, 0.1), 200);
            },
            wrong: () => {
                playTone(300, 'sawtooth', 0.2, 0.05);
                setTimeout(() => playTone(250, 'sawtooth', 0.3, 0.05), 150);
            },
            tada: () => {
                playTone(523.25, 'square', 0.1, 0.05);
                setTimeout(() => playTone(659.25, 'square', 0.1, 0.05), 100);
                setTimeout(() => playTone(783.99, 'square', 0.1, 0.05), 200);
                setTimeout(() => playTone(1046.50, 'square', 0.4, 0.05), 300);
            }
        };

        document.addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON' || e.target.closest('.back-btn') || e.target.closest('.menu-btn')) {
                if (!e.target.classList.contains('option-btn') && !e.target.id.includes('next-stage-btn')) {
                    sfx.click();
                }
            }
        });

        function getImgSpan(code) {
            return `<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${code}.svg" draggable="false" style="width: 1em; height: 1em; vertical-align: -0.1em; pointer-events: none;">`;
        }

        // 把動物名稱加上注音 HTML
        const themes = [
            { num: 1, color: '#f5cd79', code: '1f439', name: '水豚君' },
            { num: 2, color: '#ffb8b8', code: '1f430', name: '兔兔' },
            { num: 3, color: '#baffc9', code: '1f422', name: '烏龜' },
            { num: 4, color: '#bae1ff', code: '1f427', name: '企鵝' },
            { num: 5, color: '#ffdfba', code: '1f418', name: '大象' },
            { num: 6, color: '#ffc6ff', code: '1f992', name: '長頸鹿' },
            { num: 7, color: '#81ecec', code: '1f43c', name: '熊貓' },
            { num: 8, color: '#55efc4', code: '1f436', name: '狗狗' },
            { num: 9, color: '#ffeaa7', code: '1f431', name: '貓咪' }
        ];

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (id === 'game') startGame();
        }

        /* =====================================
           🌟 全新互動學習模式 - 裝進籃子裡 🌟
           ===================================== */
        let teachTheme = null;
        let teachMultiplier = 1;
        let currentTargetBasket = 0;
        let animalsInCurrentBasket = 0;
        let currentMenuTarget = 'interactive';

        function openMenu(target) {
            currentMenuTarget = target;
            showScreen('learn-menu');
        }

        function generateLearnMenu() {
            const container = document.getElementById('learn-menu-container');
            container.innerHTML = '';
            themes.forEach(theme => {
                const card = document.createElement('div');
                card.className = 'learn-card';
                card.onclick = () => {
                    if (currentMenuTarget === 'interactive') {
                        initInteractiveLearn(theme);
                    } else if (currentMenuTarget === 'read') {
                        initReadMode(theme);
                    }
                };
                let bColor = theme.color;
                card.style.borderColor = bColor;
                card.innerHTML = `
                    <div style="font-size: 5rem; line-height: 1;">${getImgSpan(theme.code)}</div>
                    <h2 style="color: #2d3436; font-size: 2.5rem; margin: 15px 0;">${theme.num} 的派對</h2>
                    <span style="background: ${bColor}; color:#4a4a4a; padding: 6px 18px; border-radius: 20px; font-weight:bold; font-size: 1.5rem;">${theme.name}</span>
                `;
                container.appendChild(card);
            });
        }

        function initReadMode(theme) {
            showScreen('read-interactive');
            document.getElementById('read-title').innerHTML = `${getImgSpan(theme.code)} ${theme.name} 發音卡片！`;
            const container = document.getElementById('read-grid-container');
            container.innerHTML = '';
            for (let i = 1; i <= 9; i++) {
                let card = document.createElement('button');
                card.style.cssText = 'background: #fff; border: 4px solid #a29bfe; border-radius: 20px; padding: 1.5rem 0.5rem; font-size: 2rem; font-weight: bold; color: #2d3436; cursor: pointer; box-shadow: 0 8px 0 #6c5ce7; transition: all 0.2s; font-family: inherit;';
                card.innerText = `${theme.num} × ${i}`;
                card.onmousedown = () => { card.style.transform = 'translateY(6px)'; card.style.boxShadow = '0 0px 0 #6c5ce7'; };
                card.onmouseup = () => { card.style.transform = 'translateY(0)'; card.style.boxShadow = '0 8px 0 #6c5ce7'; };
                card.onclick = () => {
                    sfx.click();
                    let ans = theme.num * i;
                    card.innerText = `${theme.num} × ${i} = ${ans}`;
                    card.style.background = '#ffeaa7';
                    if ('speechSynthesis' in window) {
                        window.speechSynthesis.cancel();
                        let text = `${theme.num} ${i} 等於 ${ans}`;
                        if (ans < 10) text = `${theme.num} ${i} 得 ${ans}`;
                        let msg = new SpeechSynthesisUtterance(text);
                        msg.lang = 'zh-TW';
                        msg.rate = 0.9;
                        window.speechSynthesis.speak(msg);
                    }
                };
                container.appendChild(card);
            }
        }

        function initInteractiveLearn(theme) {
            teachTheme = theme;
            teachMultiplier = 1;
            showScreen('learn-interactive');
            document.getElementById('learn-subtitle').innerHTML = `${getImgSpan(teachTheme.code)} ${teachTheme.name} 的派對！`;
            setupLearnStage();
        }

        function setupLearnStage() {
            currentTargetBasket = 0;
            animalsInCurrentBasket = 0;
            document.getElementById('eq-f1').innerText = teachTheme.num;
            document.getElementById('eq-f2').innerText = teachMultiplier;
            document.getElementById('eq-ans').innerText = '?';
            document.getElementById('eq-ans').style.color = '#ff7675';

            document.getElementById('hint-text').innerHTML = `點擊下方的 ${getImgSpan(teachTheme.code)}，把牠們裝進發光的籃子裡！👆`;
            document.getElementById('next-stage-btn').style.display = 'none';

            const basketsDiv = document.getElementById('baskets-container');
            basketsDiv.innerHTML = '';
            for (let i = 0; i < teachMultiplier; i++) {
                let bas = document.createElement('div');
                bas.className = 'basket';
                bas.id = `basket-${i}`;
                basketsDiv.appendChild(bas);
            }
            highlightBasket(0);

            const waitDiv = document.getElementById('waiting-animals');
            waitDiv.innerHTML = '';
            let totalNeeded = teachTheme.num * teachMultiplier;
            for (let i = 0; i < totalNeeded; i++) {
                let animal = document.createElement('div');
                animal.className = 'animal-item';
                animal.innerHTML = getImgSpan(teachTheme.code);
                animal.onclick = function () { moveToBasket(this); };
                waitDiv.appendChild(animal);
            }
        }

        function highlightBasket(index) {
            document.querySelectorAll('.basket').forEach(b => b.classList.remove('highlight'));
            let bas = document.getElementById(`basket-${index}`);
            if (bas) bas.classList.add('highlight');
        }

        function moveToBasket(element) {
            if (currentTargetBasket >= teachMultiplier) return;
            sfx.pop();

            let currentBasket = document.getElementById(`basket-${currentTargetBasket}`);
            let inBasketAnimal = document.createElement('div');
            inBasketAnimal.innerHTML = getImgSpan(teachTheme.code);
            inBasketAnimal.className = 'animal-item placed';
            inBasketAnimal.style.animation = 'popIn 0.2s';
            currentBasket.appendChild(inBasketAnimal);

            element.remove();
            animalsInCurrentBasket++;

            if (animalsInCurrentBasket >= teachTheme.num) {
                animalsInCurrentBasket = 0;
                currentTargetBasket++;

                currentBasket.classList.remove('highlight');
                currentBasket.style.borderColor = '#00b894';
                currentBasket.style.backgroundColor = 'rgba(0, 184, 148, 0.2)';
                currentBasket.classList.add('pop');
                setTimeout(() => currentBasket.classList.remove('pop'), 300);

                if (currentTargetBasket < teachMultiplier) {
                    highlightBasket(currentTargetBasket);
                } else {
                    stageCompleted();
                }
            }
        }

        function stageCompleted() {
            let total = teachTheme.num * teachMultiplier;
            let ansEl = document.getElementById('eq-ans');

            ansEl.innerText = total;
            ansEl.style.color = '#00b894';
            ansEl.classList.add('pop');

            document.getElementById('hint-text').innerHTML = `太棒了！ ${teachMultiplier} 個籃子，各有 ${teachTheme.num} 隻，總共是 ${total} 隻！🎉`;

            let btn = document.getElementById('next-stage-btn');
            btn.style.display = 'inline-block';
            btn.classList.add('pop');

            sfx.tada();
            shootConfettiMini();

            if (teachMultiplier === 9) {
                btn.innerHTML = "⭐ 大成功！(回去)";
            } else {
                btn.innerHTML = "下一關！➡️";
            }
        }

        function nextLearnStage() {
            sfx.click();
            if (teachMultiplier < 9) {
                teachMultiplier++;
                setupLearnStage();
            } else {
                shootConfettiMax();
                setTimeout(() => showScreen('learn-menu'), 2000);
            }
        }

        /* =====================================
           🎮 超級闖關挑戰 (遊戲模式)
           ===================================== */
        let currentScore = 0;
        let currentCombo = 0;
        let currentQuestion = {};

        // 讚美名單也加入注音
        const praises = [
            '太棒了！🎉',
            '天才！💡',
            '太強了！🌟',
            '好聰明！🧠'
        ];

        function startGame() {
            currentScore = 0;
            currentCombo = 0;
            updateStats();
            nextQuestion();
        }

        function nextQuestion() {
            const factor1 = Math.floor(Math.random() * 9) + 1;
            const factor2 = Math.floor(Math.random() * 9) + 1;
            const answer = factor1 * factor2;
            currentQuestion = { factor1, factor2, answer };

            const questionEl = document.getElementById('question-text');
            questionEl.innerText = `${factor1} × ${factor2} = ?`;
            questionEl.classList.add('pop');
            setTimeout(() => questionEl.classList.remove('pop'), 300);

            let options = new Set();
            options.add(answer);
            while (options.size < 4) {
                let wrongAns = (Math.floor(Math.random() * 9) + 1) * (Math.floor(Math.random() * 9) + 1);
                if (wrongAns !== answer) options.add(wrongAns);
            }
            let optionsArr = Array.from(options).sort(() => Math.random() - 0.5);

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            optionsArr.forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selected, btn) {
            if (selected === currentQuestion.answer) {
                sfx.correct();
                shootConfettiMini();
                showFeedback();
                currentCombo++;
                currentScore += 10 + (currentCombo * 5);
                updateStats();
                document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
                setTimeout(nextQuestion, 800);
            } else {
                sfx.wrong();
                btn.classList.add('shake');
                setTimeout(() => btn.classList.remove('shake'), 400);
                currentCombo = 0;
                updateStats();
            }
        }

        function updateStats() {
            document.getElementById('score').innerText = currentScore;
            document.getElementById('combo').innerText = currentCombo;
        }

        function shootConfettiMini() {
            confetti({ particleCount: 40, spread: 60, origin: { y: 0.6 }, colors: ['#ffeaa7', '#81ecec', '#ff7675'] });
        }
        function shootConfettiMax() {
            confetti({ particleCount: 150, zIndex: 9999 });
        }

        function showFeedback() {
            const msg = document.getElementById('feedback-msg');
            msg.innerHTML = praises[Math.floor(Math.random() * praises.length)];
            msg.classList.remove('show');
            void msg.offsetWidth;
            msg.classList.add('show');
        }

        window.onload = () => {
            const menuBtns = document.querySelector('.menu-btns');
            const learnBtn = document.querySelector('.menu-btn.learn');
            learnBtn.setAttribute('onclick', "openMenu('interactive')");

            const readBtn = document.createElement('button');
            readBtn.className = 'menu-btn learn';
            readBtn.setAttribute('onclick', "openMenu('read')");
            readBtn.style.cssText = 'background: #fff; color: #6c5ce7; box-shadow: 0 10px 20px rgba(108, 92, 231, 0.2); border-bottom: 8px solid #a29bfe;';
            readBtn.innerHTML = `
                <span class="icon">🎤</span>
                <span>聽聽乘法</span>
                <span style="font-size: 1.4rem; color: #636e72;">點了會發出聲音！</span>
            `;
            menuBtns.insertBefore(readBtn, document.querySelector('.menu-btn.game'));

            const readScreen = document.createElement('div');
            readScreen.id = 'read-interactive';
            readScreen.className = 'screen';
            readScreen.innerHTML = `
                <div class="top-nav">
                    <button class="back-btn" onclick="showScreen('learn-menu')">⬅️ 換個小動物</button>
                </div>
                <div class="blackboard-container" style="background: #a29bfe; border-color: #fff;">
                    <div id="read-title" class="chalk-title"></div>
                    <div id="read-grid-container" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 2rem auto; max-width: 600px;"></div>
                </div>
            `;
            document.body.insertBefore(readScreen, document.getElementById('game'));

            generateLearnMenu();
        };
    </script>
</body>

</html>
